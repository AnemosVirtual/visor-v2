name: Release Build and Deploy

on:
  workflow_dispatch:

jobs:
  minify-obfuscate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build dependencies
        run: npm install --no-save terser javascript-obfuscator

      - name: Minify and obfuscate src/main.js
        run: |
          mkdir -p dist
          npx terser src/main.js --compress --mangle --output dist/main.min.js
          npx javascript-obfuscator dist/main.min.js --output dist/main.js
          rm dist/main.min.js

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=visor-v2
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
